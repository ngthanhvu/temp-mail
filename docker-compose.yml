services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: temp-mail-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-to-a-strong-random-string}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: temp-mail-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost:4000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
